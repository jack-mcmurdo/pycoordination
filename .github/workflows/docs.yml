name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # the CLOUDFLARE_* secrets live in the "deploy" environment
    environment: deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs toolchain
        run: pip install -e .[docs]

      - name: Build site
        run: mkdocs build --strict

      # Cloudflare Pages' own git integration cannot fetch LFS objects,
      # so the site is built here and deployed by direct upload.
      - name: Deploy to Cloudflare Pages
        # skips (build still verified) until the CLOUDFLARE_* secrets are configured
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=pycoordination --branch=production
